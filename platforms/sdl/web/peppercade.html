<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Peppercade</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    html { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #100d18; }
    body {
      position: fixed;
      inset: 0;
      margin: 0;
      overflow: hidden;
      background: #100d18;
      color: #f4e9d8;
      font: 14px system-ui, sans-serif;
    }
    main {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      min-height: 0;
      padding: clamp(8px, 2vh, 16px);
      box-sizing: border-box;
    }
    #stage { position: relative; display: flex; min-width: 0; min-height: 0; align-items: center; justify-content: center; overflow: hidden; }
    #canvas {
      display: block;
      width: 300px;
      height: 169px;
      max-width: 100%;
      max-height: 100%;
      background: #171222;
      image-rendering: pixelated;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: #171222;
      color: #65d5f1;
      font-weight: 700;
      letter-spacing: .12em;
      transition: opacity .15s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #footer {
      justify-self: center;
      max-width: 100%;
      margin-top: clamp(6px, 1.5vh, 12px);
      color: #c5b8c3;
      font-size: clamp(11px, 1.2vw, 14px);
      line-height: 1.4;
    }
    #footer p { margin: 0; }
  </style>
</head>
<body>
  <main>
    <div id="stage">
      <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
      <div id="loading">LOADING PEPPERCADE…</div>
    </div>
    <footer id="footer">
      <p>Arrow keys: select and play · Enter/Space: confirm · Escape: pause/back</p>
    </footer>
  </main>
  <script>
    var canvas = document.getElementById('canvas');
    var main = document.querySelector('main');
    var stage = document.getElementById('stage');
    var loading = document.getElementById('loading');
    var footer = document.getElementById('footer');

    function fitCanvas() {
      var mainStyle = window.getComputedStyle(main);
      var mainWidth = main.clientWidth - parseFloat(mainStyle.paddingLeft) -
          parseFloat(mainStyle.paddingRight);
      var maxWidth = Math.min(stage.clientWidth, mainWidth);
      var maxHeight = stage.clientHeight;
      if (maxWidth < 2 || maxHeight < 2) return;

      var width = Math.min(maxWidth, maxHeight * 16 / 9);
      var height = width * 9 / 16;
      canvas.style.width = Math.max(1, Math.floor(width)) + 'px';
      canvas.style.height = Math.max(1, Math.floor(height)) + 'px';
      footer.style.width = Math.max(1, Math.floor(width)) + 'px';
    }

    fitCanvas();
    window.addEventListener('resize', fitCanvas);
    if (window.ResizeObserver) new ResizeObserver(fitCanvas).observe(stage);

    function printRuntimeWarning(text) {
      // SDL probes POSIX signal handling during startup. Browsers do not have
      // POSIX signals, and this legacy Emscripten SDK reports its intentional
      // no-op implementation as a warning.
      if (text === 'Calling stub instead of sigaction()') return;
      if (window.console) console.warn(text);
    }

    var Module = {
      canvas: canvas,
      // Replaced by build-pages.sh so HTML, JavaScript, and WebAssembly cannot
      // be mixed across GitHub Pages deployments by the browser cache.
      locateFile: function(path) {
        return path + '?v=__PEPPERCADE_ASSET_VERSION__';
      },
      onFirstFrame: function() { loading.className = 'hidden'; },
      printErr: printRuntimeWarning
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
